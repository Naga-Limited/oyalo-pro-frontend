name: Build and Deploy to ECS Fargate

on:
  push:
    branches:
      - main
      

jobs:
  deploy:
    name: Build, Push to ECR, and Deploy to ECS Fargate
    runs-on: ubuntu-latest
    environment: naga

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_PROD }}
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_PROD }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE_PROD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App with Test Environment
        env:
          REACT_APP_PROJECT_ID: oyaloPro
          REACT_APP_VERSION: ${{ github.sha }}
          NODE_ENV: production
          REACT_APP_API_BASE_URL: https://testoyalopro.nagamills.com/api/
          REACT_APP_X_API_KEY: ${{ secrets.REACT_APP_X_API_KEY }}
          PUBLIC_URL: https://testoyalopro.nagamills.com/
        run: npm run build

      - name: Verify Build Contains Correct API URL
        run: |
          echo "Checking if build contains correct API URL..."
          echo "Files in build/static/js:"
          ls -lh build/static/js/
          echo ""
          echo "Searching for API URL in JavaScript files..."
          if grep -l "testoyalopro\.nagamills\.com/api" build/static/js/*.js | head -1; then
            echo "✅ Build contains correct TEST API URL"
            grep -o "https://testoyalopro[^\"]*" build/static/js/main.*.js | head -3
          else
            echo "❌ ERROR: Build does NOT contain correct API URL!"
            echo "Found URLs:"
            grep -o "https://[^\"]*nagamills[^\"]*" build/static/js/main.*.js | head -5 || echo "No URLs found"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image (Nginx with pre-built files)
        run: |
          echo "Building Docker image with Nginx only (no npm build)..."
          docker build \
            -f Dockerfile.prod \
            -t ${{ env.ECR_REPOSITORY }}:test-${{ github.sha }} \
            .

      - name: Tag Docker image
        run: |
          docker tag \
            ${{ env.ECR_REPOSITORY }}:test-${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker tag \
            ${{ env.ECR_REPOSITORY }}:test-${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:test-${{ github.sha }}

      - name: Push Docker image to Amazon ECR
        run: |
          echo "Pushing Docker images to ECR..."
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:test-${{ github.sha }}
          echo "✅ Images pushed successfully"

  
      - name: Wait for ECR image to be fully available
        run: sleep 30

      - name: Force deploy to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_PROD }}" \
            --service "${{ secrets.ECS_SERVICE_PROD }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for deployment to stabilize
        continue-on-error: true
        run: |
          echo "Waiting for ECS service to stabilize (max 10 minutes)..."
          timeout 600 aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER_PROD }}" \
            --services "${{ secrets.ECS_SERVICE_PROD }}" \
            --region "${{ env.AWS_REGION }}" || echo "⚠️ Wait timeout - check ECS console manually"

      - name: Check Deployment Status
        run: |
          echo "Checking ECS service status..."
          aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER_PROD }}" \
            --services "${{ secrets.ECS_SERVICE_PROD }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'services[0].{deployments:deployments,runningCount:runningCount,desiredCount:desiredCount,events:events[0:3]}' \
            --output json

      - name: Deployment Success
        run: |
          echo "✅ Deployment triggered successfully!"
          echo "⚠️ Note: Service may still be stabilizing"
          echo ""
          echo "Frontend URL: https://testoyalopro.nagamills.com/"
          echo "API URL: https://testoyalopro.nagamills.com/op_api/api/"
          echo "Expected login endpoint: https://testoyalopro.nagamills.com/op_api/api/login"
          echo ""
          echo "Check ECS console for deployment status:"
          echo "https://console.aws.amazon.com/ecs"











